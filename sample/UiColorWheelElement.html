            <ui-color-wheel style="width: 200px;" ></ui-color-wheel>

                <div style="
                    position: absolute;
                    inset: 23%;
                    background-color: #999;
                    z-index: 1;" 
                    onclick="console.log('x');">
                    123
                </div>
            </div>
            <div style="position: relative;">
                <ui-color-wheel-hue style="width: 300px;--inner-ratio:0.5" ></ui-color-wheel-hue>
                <div style="
                    position: absolute;
                    inset: 33%;
                    background-color: #999;
                    z-index: 1;" 
                    onclick="console.log('x');">
                    123
                </div>
            </div>
            
        </div>
    </div>
