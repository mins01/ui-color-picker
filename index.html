<body>
    <div class="container">
        <h1>ui-color-picker</h1>
        <hr>
        <h3>sample</h3>
        <ul class="list-group">
            <li class="list-group-item"><a href="sample/UiColorBarElement.html">UiColorBarElement.html</a></li>
            <li class="list-group-item"><a href="sample/UiColorWheelElement.html">UiColorWheelElement.html</a></li>
            <li class="list-group-item"><a href="sample/UiColorElement.html">UiColorElement.html</a></li>
            <li class="list-group-item"><a href="sample/UiColorHueBarElement.html">UiColorHueBarElement.html</a></li>
            <li class="list-group-item"><a href="sample/UiColorPlaneSlElement.html">UiColorPlaneSlElement.html</a></li>
            <li class="list-group-item"><a href="sample/UiColorPlaneSbElement.html">UiColorPlaneSbElement.html</a></li>
            <li class="list-group-item"><a href="sample/UiColorSwatchesElement.html">UiColorSwatchesElement.html</a></li>
            <li class="list-group-item"><a href="sample/UiColorPickerElement.html">UiColorPickerElement.html</a></li>
        </ul>
        <hr>
        <div>
            <dialog id="dialogPicker1" class="dialog-color-picker">
                <ui-color-picker class="border rounded d-flex flex-column user-select-none gap-2 p-3" style="width: 100vw;" onclick="console.log(this.pendingColor.toRgbString());" value="#33ff00">
                    <div class="d-flex gap-3 " >
                        <ui-color-plane-sl class="sync-hue sync-part-color" style="flex: 1 0 auto; aspect-ratio: 1/1;"></ui-color-plane-sl>
                        <ui-color-bar-hue class="sync-part-color" style="flex: 0 0 30px;"></ui-color-bar-hue>
                    </div>
                    <div class="d-flex flex-wrap gap-2 user-select-all">
                        <input name="toHslString" data-to-string-type="hsl" data-set-color="pendingColor" class="sync-pending-color col form-control form-control-sm" style="flex: 1 0 8em;">
                        <input name="toRgbString" data-to-string-type="rgb" data-set-color="pendingColor" class="sync-pending-color col form-control form-control-sm" style="flex: 1 0 8em;">
                        <input name="toHexString" data-to-string-type="hex" data-set-color="pendingColor" class="sync-pending-color col form-control form-control-sm" style="flex: 0 1 6em;">
                    </div>
                    <div class="d-flex flex-wrap gap-2">
                        <div class="input-group col">
                            <ui-color data-target-color="selectColor" class="sync-selected-color sync-hue rounded-start-pill border d-flex justify-content-center align-items-center user-select-none col"><div style="text-shadow: 0px 0px 2px #000; color: #fff;">Selected</div></ui-color>
                            <ui-color data-target-color="pendingColor" class="sync-pending-color rounded-end-pill border d-flex justify-content-center align-items-center user-select-none col" value="#fff"><div style="text-shadow: 0px 0px 2px #000; color: #fff;">Pending</div></ui-color>
                        </div>
                        <div class="d-flex gap-1 col">
                            <button type="button" class="btn btn-primary btn-sm col" onclick="this.closest('ui-color-picker').confirm()">Confirm</button>
                            <button type="button" class="btn btn-secondary btn-sm col" onclick="this.closest('ui-color-picker').cancel()" >Cancel</button>
                        </div>
                    </div>
                    <ui-color-swatches 
                        maxlength="40"
                        storage-key="color-picker-1"
                        auto-save="1"
                        auto-load="1"
                        toggle-pin-on-dblclick
                        class="sync-selected-color swatches overflow-auto py-1" 
                        >
                        <ui-color-swatch class="swatch locked" value="#000000"></ui-color-swatch> <!-- black -->
                        <ui-color-swatch class="swatch locked" value="#FFFFFF"></ui-color-swatch> <!-- white -->

                        <ui-color-swatch class="swatch locked" value="#FF0000"></ui-color-swatch> <!-- red -->
                        <ui-color-swatch class="swatch locked" value="#00FF00"></ui-color-swatch> <!-- green -->
                        <ui-color-swatch class="swatch locked" value="#0000FF"></ui-color-swatch> <!-- blue -->

                        <ui-color-swatch class="swatch locked" value="#FFFF00"></ui-color-swatch> <!-- yellow -->
                        <ui-color-swatch class="swatch locked" value="#00FFFF"></ui-color-swatch> <!-- cyan -->
                        <ui-color-swatch class="swatch locked" value="#FF00FF"></ui-color-swatch> <!-- magenta -->

                    </ui-color-swatches>
                </ui-color-picker>
            </dialog>
            <button type="button" class="btn btn-primary" onclick="dialogPicker1.showModal()">ShowModal</button>
            <button type="button" class="btn btn-primary" onclick="dialogPicker1.querySelector('ui-color-picker').value = '#f00'; dialogPicker1.showModal()">#f00 ShowModal</button>
            <button type="button" class="btn btn-primary" onclick="dialogPicker1.querySelector('ui-color-picker').value = `rgb(${Math.floor(Math.random() * 256)},${Math.floor(Math.random() * 256)},${Math.floor(Math.random() * 256)})`; dialogPicker1.showModal()">random color ShowModal</button>

            <script>
                const dialogPicker1 = document.getElementById('dialogPicker1');
                dialogPicker1.addEventListener('confirm-color-picker', (event) => {
                    console.log('confirm-color-picker',event.target.value);
                    alert(event.type+' : '+event.target.value);
                    dialogPicker1.close();
                })
                dialogPicker1.addEventListener('cancel-color-picker', (event) => {
                    console.log('confirm-color-picker',event.target.value);
                    // alert(event.type+' : '+event.target.value);
                    dialogPicker1.close();
                })
            </script>
        </div>
    </div>
</body>
