    <script type="module">
        import Color from "../third_party/js-color/v2/src/Color.js";
        window.Color = Color;

        import UiColorElement from '../src/UiColorElement.js';
        UiColorElement.defineCustomElement();
        import UiColorBarHueElement from '../src/UiColorBarHueElement.js';
        UiColorBarHueElement.defineCustomElement();
        import UiColorPlaneSlElement from '../src/UiColorPlaneSlElement.js';
        UiColorPlaneSlElement.defineCustomElement();
        import UiColorPlaneSbElement from '../src/UiColorPlaneSbElement.js';
        UiColorPlaneSbElement.defineCustomElement();
        import UiColorSwatchElement from '../src/UiColorSwatchElement.js';
        UiColorSwatchElement.defineCustomElement();
        import UiColorSwatchesElement from '../src/UiColorSwatchesElement.js';
        UiColorSwatchesElement.defineCustomElement();
        import UiColorPickerElement from '../src/UiColorPickerElement.js';
        UiColorPickerElement.defineCustomElement();
        
    </script>
    <script>
        document.addEventListener('confirm-color-picker', (event) => { 
            console.log(event.type,event.target.color.toRgbString())
        });
        document.addEventListener('cancel-color-picker', (event) => { console.log(event.type,event.target.color.toRgbString()) });
        
    </script>
    <style>
        ui-color.btn{
            --bs-btn-bg: var(--color);;
            --bs-btn-border-color: var(--color);;
            
            --bs-btn-hover-bg: var(--color);;
            --bs-btn-hover-border-color: var(--color);;
            --bs-btn-focus-shadow-rgb: 49, 132, 253;
            --bs-btn-active-color: #fff;
            --bs-btn-active-bg: var(--color);;
            --bs-btn-active-border-color: var(--color);;
            
            --bs-btn-disabled-color: #fff;
            --bs-btn-disabled-bg: var(--color);;
            --bs-btn-disabled-border-color: var(--color);;
        }
        ui-color-picker{
            font-size: 16px;
        }
        ui-color-bar-hue::part(bg),
        ui-color-plane-sl::part(bg),
        ui-color-plane-sb::part(bg){
            border-radius: var(--bs-border-radius) !important;
            box-shadow:0 0 0 1px var(--bs-border-color) !important;
        }

    </style>
    
</head>

<body>
    <div class="container py-3" id="container0">
        <h1>Test - UiColorPickerElement</h1>
        <hr>

        <ui-color-picker id="picker" class="border rounded" style="max-width: 400px;" onclick="console.log(this.pendingColor.toRgbString());" value="#33ff00">
            <div class="d-flex flex-column gap-2 p-3">
                <div class="d-flex gap-3" style="width: 100%;height: auto; aspect-ratio: 6/3;">
                    <ui-color-plane-sl class="sync-hue sync-part-color" style="flex: 1 0 auto; aspect-ratio: 1/1;"></ui-color-plane-sl>
                    <ui-color-bar-hue class="sync-part-color" style="flex: 0 0 30px;"></ui-color-bar-hue>
                </div>
                <div class="">
                    <div class="d-flex flex-wrap gap-2">
                        <input name="toHslString" data-to-string-type="hsl" data-set-color="pendingColor" class="sync-pending-color col form-control form-control-sm" style="flex: 1 0 8em;">
                        <input name="toRgbString" data-to-string-type="rgb" data-set-color="pendingColor" class="sync-pending-color col form-control form-control-sm" style="flex: 1 0 8em;">
                        <input name="toHexString" data-to-string-type="hex" data-set-color="pendingColor" class="sync-pending-color col form-control form-control-sm" style="flex: 0 1 6em;">
                    </div>
                </div>
                <div class="">
                    <div class="d-flex flex-wrap gap-2">
                        <div class="input-group col">
                            <ui-color data-target-color="selectColor" class="sync-selected-color sync-hue rounded-start-pill border d-flex justify-content-center align-items-center user-select-none col"><div style="text-shadow: 0px 0px 2px #000; color: #fff;">Selected</div></ui-color>
                            <ui-color data-target-color="pendingColor" class="sync-pending-color rounded-end-pill border d-flex justify-content-center align-items-center user-select-none col" value="#fff"><div style="text-shadow: 0px 0px 2px #000; color: #fff;">Pending</div></ui-color>
                        </div>
                        <div class="d-flex gap-1 col">
                            <button type="button" class="btn btn-primary btn-sm col" onclick="this.closest('ui-color-picker').confirm()">Confirm</button>
                            <button type="button" class="btn btn-secondary btn-sm col" onclick="this.closest('ui-color-picker').cancel()" >Cancel</button>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="overflow-auto py-1" style="max-height: 120px;">
                        <ui-color-swatches 
                            maxlength="40"
                            storage-key="color-picker-1"
                            auto-save="1"
                            auto-load="1"
                            toggle-pin-on-dblclick
                            class="sync-selected-color swatches" 
                            >
                            <ui-color-swatch class="swatch locked" value="#000000"></ui-color-swatch> <!-- black -->
                            <ui-color-swatch class="swatch locked" value="#FFFFFF"></ui-color-swatch> <!-- white -->
        
                            <ui-color-swatch class="swatch locked" value="#FF0000"></ui-color-swatch> <!-- red -->
                            <ui-color-swatch class="swatch locked" value="#00FF00"></ui-color-swatch> <!-- green -->
                            <ui-color-swatch class="swatch locked" value="#0000FF"></ui-color-swatch> <!-- blue -->
        
                            <ui-color-swatch class="swatch locked" value="#FFFF00"></ui-color-swatch> <!-- yellow -->
                            <ui-color-swatch class="swatch locked" value="#00FFFF"></ui-color-swatch> <!-- cyan -->
                            <ui-color-swatch class="swatch locked" value="#FF00FF"></ui-color-swatch> <!-- magenta -->
        
                        </ui-color-swatches>
                    </div>
                </div>                
            </div>
        </ui-color-picker>
        <hr>
        <ui-color-picker id="picker2" class="border rounded" style="max-width: 400px;" onclick="console.log(this.pendingColor.toRgbString());" value="#33ff00">
            <div class="d-flex flex-column gap-2 p-3">
                <div class="d-flex gap-3" style="width: 100%;height: auto;  ">
                    <div style="flex: 1 0 auto; aspect-ratio: 1/1;">
                        <div class="form-label">HSL</div>
                        <ui-color-plane-sl class="sync-hue sync-part-color" style="flex: 1 0 auto; aspect-ratio: 1/1;">HSL</ui-color-plane-sl>
                    </div>
                    <div style="flex: 1 0 auto; aspect-ratio: 1/1;">
                        <div class="form-label">HSB</div>
                        <ui-color-plane-sb class="sync-hue sync-part-color" style="flex: 1 0 auto; aspect-ratio: 1/1;">HSB</ui-color-plane-sb>
                    </div>
                    <div  style="flex: 0 0 30px;" class="d-flex flex-column align-items-stretch w-100">
                        <div class="form-label">HUE</div>
                        <ui-color-bar-hue class="sync-part-color" style="flex: 1 0 30px; height: 100%;"></ui-color-bar-hue>
                    </div>
                </div>
                <div class="">
                    <div class="d-flex flex-wrap gap-2">
                        <input name="toHslString" data-to-string-type="hsl" data-set-color="pendingColor" class="sync-pending-color col form-control form-control-sm" style="flex: 1 0 8em;">
                        <input name="toHsbString" data-to-string-type="hsb" data-set-color="pendingColor" class="sync-pending-color col form-control form-control-sm" style="flex: 1 0 8em;">
                        <input name="toRgbString" data-to-string-type="rgb" data-set-color="pendingColor" class="sync-pending-color col form-control form-control-sm" style="flex: 1 0 8em;">
                        <input name="toHexString" data-to-string-type="hex" data-set-color="pendingColor" class="sync-pending-color col form-control form-control-sm" style="flex: 0 1 6em;">
                    </div>
                </div>
                <div class="">
                    <div class="d-flex flex-wrap gap-2">
                        <div class="input-group col">
                            <ui-color data-target-color="selectColor" class="sync-selected-color sync-hue rounded-start-pill border d-flex justify-content-center align-items-center user-select-none col"><div style="text-shadow: 0px 0px 2px #000; color: #fff;">Selected</div></ui-color>
                            <ui-color data-target-color="pendingColor" class="sync-pending-color rounded-end-pill border d-flex justify-content-center align-items-center user-select-none col" value="#fff"><div style="text-shadow: 0px 0px 2px #000; color: #fff;">Pending</div></ui-color>
                        </div>
                        <div class="d-flex gap-1 col">
                            <button type="button" class="btn btn-primary btn-sm col" onclick="this.closest('ui-color-picker').confirm()">Confirm</button>
                            <button type="button" class="btn btn-secondary btn-sm col" onclick="this.closest('ui-color-picker').cancel()" >Cancel</button>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="overflow-auto py-1" style="max-height: 120px;">
                        <ui-color-swatches 
                            maxlength="40"
                            storage-key="color-picker-2"
                            auto-save="1"
                            auto-load="1"
                            toggle-pin-on-dblclick
                            class="sync-selected-color swatches" 
                            >
                            <ui-color-swatch class="swatch locked" value="#000000"></ui-color-swatch> <!-- black -->
                            <ui-color-swatch class="swatch locked" value="#FFFFFF"></ui-color-swatch> <!-- white -->
        
                            <ui-color-swatch class="swatch locked" value="#FF0000"></ui-color-swatch> <!-- red -->
                            <ui-color-swatch class="swatch locked" value="#00FF00"></ui-color-swatch> <!-- green -->
                            <ui-color-swatch class="swatch locked" value="#0000FF"></ui-color-swatch> <!-- blue -->        
                        </ui-color-swatches>
                    </div>
                </div>                
            </div>
        </ui-color-picker>
    </div>
    
</body>
</html>
