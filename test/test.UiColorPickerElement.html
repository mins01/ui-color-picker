    <style>
        ui-color.btn{
            --bs-btn-bg: var(--color);;
            --bs-btn-border-color: var(--color);;
            
            --bs-btn-hover-bg: var(--color);;
            --bs-btn-hover-border-color: var(--color);;
            --bs-btn-focus-shadow-rgb: 49, 132, 253;
            --bs-btn-active-color: #fff;
            --bs-btn-active-bg: var(--color);;
            --bs-btn-active-border-color: var(--color);;
            
            --bs-btn-disabled-color: #fff;
            --bs-btn-disabled-bg: var(--color);;
            --bs-btn-disabled-border-color: var(--color);;
        }
        ui-color-picker{
            font-size: 16px;
            --clickable-size:32px;
        }
        ui-color-picker .btn,
        ui-color-picker ui-color{
            font-size: 14px;
            height: var(--clickable-size);
            display: flex;
            justify-content: center;
            align-items: center;
            padding:0px
        }
        ui-color-picker .histories{
            background-color: #abc;
            
        }
        ui-color-picker .swatches .swatch{
            width: var(--clickable-size);
            height: var(--clickable-size);
        }

        ui-color[data-target-color="selectColor"]{

        }

    </style>
    <style>
        .swatches{
            --font-size:16px;
            --border-radius: 4px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(calc( var(--font-size,20px) * 2 ), 1fr)); 
            gap: 4px;
            align-items: center;
            justify-items: center;
            justify-content: start;
        }
        .swatch{
            width: calc( var(--font-size,20px) * 2 );
            height: calc( var(--font-size,20px) * 2 );
            border-radius: var(--border-radius);
            user-select: none;
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #ccc;

        }
        .swatch.locked{}
        .swatch.locked::after{
            content: '🔒';
            font-size: calc( var(--font-size) * 0.8 );
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
        }
        .swatch.pinned{}
        .swatch.pinned::after{
            content: '📌';
            font-size:  calc( var(--font-size) * 0.8 );
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
        }

        .swatch.selected{
            border:1px solid #fff;
            box-shadow:0 0 0 1px #000;
        }
        .swatch.selected::before{
            content: '✔️';
            inset: 0px;
            border-radius: var(--border-radius);
            position: absolute;
            box-sizing: border-box;
            /* border:2px solid #000; */
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="container" id="container0">
        <h1>Test - UiColorPickerElement</h1>
        <hr>

        <ui-color-picker id="picker" class="border rounded" style="max-width: 400px;" onclick="console.log(this.pendingColor.toRgbString());" value="#33ff00">
            <div class="d-flex flex-column gap-2 p-2">
                <div class="d-flex gap-1" style="width: 100%;height: auto; aspect-ratio: 6/3;">
                    <ui-color-sl-plane class="sync-hue-bar sync-part-color rounded border border-1 overflow-hidden" style="flex: 1 0 auto; aspect-ratio: 1/1;"></ui-color-sl-plane>
                    <ui-color-hue-bar class="rounded border sync-part-color border-1 overflow-hidden" style="flex: 0 0 30px;"></ui-color-hue-bar>
                </div>
                <div class="">
                    <div class="d-flex flex-wrap gap-2">
                        <input name="toRgbString" data-to-string-type="rgb" data-set-color="pendingColor" class="sync-pending-color col form-control form-control-sm">
                        <input name="toHslString" data-to-string-type="hsl" data-set-color="pendingColor" class="sync-pending-color col form-control form-control-sm">
                    </div>
                </div>
                <div class="">
                    <div class="d-flex flex-wrap gap-2">
                        <div class="input-group col">
                            <ui-color data-target-color="selectColor" class="sync-selected-color sync-hue-bar rounded-start-pill border d-flex justify-content-center align-items-center user-select-none col"><div style="text-shadow: 0px 0px 2px #000; color: #fff;">Selected</div></ui-color>
                            <ui-color data-target-color="pendingColor" class="sync-pending-color rounded-end-pill border d-flex justify-content-center align-items-center user-select-none col" value="#fff"><div style="text-shadow: 0px 0px 2px #000; color: #fff;">Pending</div></ui-color>
                        </div>
                        <div class="d-flex gap-1 col">
                            <button type="button" class="btn btn-primary btn-sm col" onclick="this.closest('ui-color-picker').confirm()">Confirm</button>
                            <button type="button" class="btn btn-secondary btn-sm col" onclick="this.closest('ui-color-picker').cancel()" >Cancel</button>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="overflow-auto py-1" style="max-height: 120px;">
                        <ui-color-swatches 
                            maxlength="40"
                            storage-key="color-picker-test"
                            auto-save="1"
                            auto-load="1"
                            class="sync-selected-color swatches " 
                            onclick="if(event.target.classList.contains('swatch')){this.selectColor(event.target.color); this.closest('ui-color-picker').setPendingColor(event.target.color);}"
                            ondblclick="if(event.target.classList.contains('swatch')){console.log(event.target.value); this.togglePinSwatch(event.target)}"
                            >
                            <ui-color class="swatch locked" value="#000000"></ui-color> <!-- black -->
                            <ui-color class="swatch locked" value="#FFFFFF"></ui-color> <!-- white -->
        
                            <ui-color class="swatch locked" value="#FF0000"></ui-color> <!-- red -->
                            <ui-color class="swatch locked" value="#00FF00"></ui-color> <!-- green -->
                            <ui-color class="swatch locked" value="#0000FF"></ui-color> <!-- blue -->
        
                            <ui-color class="swatch locked" value="#FFFF00"></ui-color> <!-- yellow -->
                            <ui-color class="swatch locked" value="#00FFFF"></ui-color> <!-- cyan -->
                            <ui-color class="swatch locked" value="#FF00FF"></ui-color> <!-- magenta -->
        
                        </ui-color-swatches>
                    </div>
                </div>                
            </div>
        </ui-color-picker>
        
    </div>
    
</body>
