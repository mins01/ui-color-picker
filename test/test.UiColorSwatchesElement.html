    <script type="module">

    <style>
        .swatches{
            --font-size:16px;
            --border-radius: 4px;
        }
        .swatch{
            width: calc( var(--font-size,20px) * 2 );
            height: calc( var(--font-size,20px) * 2 );
            border-radius: var(--border-radius);
            user-select: none;
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .swatch.locked{}
        .swatch.locked::after{
            content: '🔒';
            font-size: calc( var(--font-size) * 0.8 );
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
        }
        .swatch.pinned{}
        .swatch.pinned::after{
            content: '📌';
            font-size:  calc( var(--font-size) * 0.8 );
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
        }

        .swatch.selected{}
        .swatch.selected::before{
            content: '';
            inset: 0;
            border-radius: var(--border-radius);
            position: absolute;
            box-sizing: border-box;
            border:2px solid #000
        }
    </style>
</head>

<body>
    <div class="container" id="container0">
        <h1>Test - UiColorSwatchesElement</h1>
        <hr>
        <ui-color-swatches  style="width: 400px;--font-size:40px" class="swatches d-flex gap-1 flex-wrap"
            maxlength="5"
            onclick="if(event.target.classList.contains('swatch')){console.log(event.target.value); this.selectColor(event.target.color)}"
            ondblclick="if(event.target.classList.contains('swatch')){console.log(event.target.value); this.togglePinSwatch(event.target)}"
            value="#aabbcc"
            >
            <ui-color class="swatch locked" value="#ff00ff"  >유지</ui-color>
            <ui-color class="swatch pinned" value="#aabbcc"  >선택유지</ui-color>
            <ui-color class="swatch recent" value="#cba"  >유지</ui-color>
            <ui-color class="swatch recent" value="#cba"  >유지</ui-color>
            <ui-color class="swatch recent" value="#cbb"  >유지</ui-color>
            <ui-color class="swatch recent" value="#cbd"  >유지</ui-color>
            <ui-color class="swatch recent" value="#cb8"  >삭제</ui-color>
            <ui-color class="swatch recent" value="#cb7"  >삭제</ui-color>
            <ui-color class="swatch recent" value="#cb6"  >삭제</ui-color>
            <ui-color class="swatch recent" value="#cb3"  >삭제</ui-color>
            <ui-color class="swatch recent" value="#cb1"  >삭제</ui-color>
        </ui-color-swatches>
        <hr>
        <ui-color-swatches
            id="swatches"
            maxlength="15"
            storage-key="swatches-test"
            auto-save="0"

            style="width: 400px;"
            class="swatches d-flex gap-1 flex-wrap"
            onclick="if(event.target.classList.contains('swatch')){console.log(event.target.value); this.selectColor(event.target.color)}"
            ondblclick="if(event.target.classList.contains('swatch')){console.log(event.target.value); this.togglePinSwatch(event.target)}"
            >
            <ui-color class="swatch locked" value="#ffcc00"  ></ui-color>
            <ui-color class="swatch pinned" value="#aabbcc"  ></ui-color>
            <ui-color class="swatch recent" value="#cba"  ></ui-color>
        </ui-color-swatches>
        <hr>
        <div class="d-flex flex-wrap gap-1">
            <button type="button" class="btn btn-primary btn-sm" onclick="document.getElementById('swatches').addlocked(Color.fromRgba(Math.random()*255,Math.random()*255,Math.random()*255,1))">addlocked(랜덤) (trim 안됨)</button>
            <button type="button" class="btn btn-primary btn-sm" onclick="document.getElementById('swatches').addPinned(Color.fromRgba(Math.random()*255,Math.random()*255,Math.random()*255,1))">addPinned(랜덤) (trim 안됨)</button>
            <button type="button" class="btn btn-primary btn-sm" onclick="document.getElementById('swatches').addRecent(Color.fromRgba(Math.random()*255,Math.random()*255,Math.random()*255,1))">addRecent(랜덤) (trim 됨)</button>
            <button type="button" class="btn btn-primary btn-sm" onclick="document.getElementById('swatches').addRecent(Color.fromString('#aa00cc'))">addRecent(#aa00cc) (같은 색은 중복 추가 안됨)</button>
            <button type="button" class="btn btn-primary btn-sm" onclick="document.getElementById('swatches').setColor(Color.fromString('#aa00cc'))">setColor(#aa00cc) (다른 요소 연동용)</button>

            <button type="button" class="btn btn-primary btn-sm" onclick="document.getElementById('swatches').getSelectedSwatch()?.remove()">getSelectedSwatch()?.remove() 선택된 색 삭제</button>
            <button type="button" class="btn btn-primary btn-sm" onclick="document.getElementById('swatches').replaceChildren()">초기화</button>
            <button type="button" class="btn btn-primary btn-sm" onclick="document.getElementById('swatches').clearSwatches()">clearSwatches() 초기화(locked 제외)</button>

            <button type="button" class="btn btn-primary btn-sm" onclick="document.getElementById('swatches').saveStorage()">saveStorage() 저장</button>
            <button type="button" class="btn btn-primary btn-sm" onclick="document.getElementById('swatches').loadStorage()">loadStorage() 로드</button>
            <button type="button" class="btn btn-primary btn-sm" onclick="document.getElementById('swatches').autoSave=false">autoSave=false</button>
            <button type="button" class="btn btn-primary btn-sm" onclick="document.getElementById('swatches').autoSave=true">autoSave=true</button>
        </div>
