    <script type="module">
        import UiColorPlaneSbElement from '../src/UiColorPlaneSbElement.js';
        UiColorPlaneSbElement.defineCustomElement();
    </script>
    <script>
        document.addEventListener('input-color', (event) => { console.log(event.type,event.target.h,event.target.s,event.target.b,event.target.color.toRgbString()) });
        document.addEventListener('change-color', (event) => { console.log(event.type,event.target.h,event.target.s,event.target.b,event.target.color.toRgbString()) });
    </script>

    <style>
        #custom-handle .custom-sb-handle{
            --handle-color:hsl(var(--h),50%,calc( clamp(0.2, (var(--b) - 0.3) * 1000, 0.8) * 100%) );
            position: relative;
            overflow: visible;
            width: 20px;
            height: 20px;
            flex:0 0 auto;
        }
        #custom-handle .custom-sb-handle::before , #custom-handle .custom-sb-handle::after{
            position: absolute;
            content: '';
            height: 100%;
            width: 0px;
            border: 4px solid #fff;
            border-color: var(--handle-color) transparent;;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
        #custom-handle .custom-sb-handle::after{
            height: 0px;
            width: 100%;
            border-color: transparent var(--handle-color);
        }
    </style>
</head>

<body>
    <div class="container py-3" id="container0">
        <h1>Test - UiColorPlaneSbElement</h1>
        <hr>

        <ui-color-plane-sb id="target" class="mx-auto" style="max-width: 800px;height: 300px;" hue="90" saturation="0.7" brightness="0.3">

        </ui-color-plane-sb>
        <div class="my-3">
            <input type="range" min="0" max="360" step="1" value="90" oninput="document.querySelector('#target').h = this.value">
            <button type="button" class="btn btn-primary" onclick="alert(JSON.stringify(document.querySelector('#target').toHsb()))">toHsb()</button>
            <button type="button" class="btn btn-primary" onclick="alert(document.querySelector('#target').toString())">toHsbString()</button>
            
            <button type="button" class="btn btn-primary" onclick="var c=document.querySelector('#target').toColor(); console.log([c.toHexString(),c.toRgbString(),c.toHslString(),c.toHsbString()].join('\n'))">toXxxString()</button>
            <button type="button" class="btn btn-primary" onclick="var c=document.querySelector('#target').toColor(); console.log(JSON.stringify([c.toHexString(),c.toRgb(),c.toHsl(),c.toHsb()],null,2))">toXxx</button>

        </div>
        <hr>
        <ui-color-plane-sb id="custom-handle"  class="mx-auto border" style="max-width: 800px;height: 300px;" value="#aabbcc" >
            <div slot="sb-handle" class="custom-sb-handle"></div>
        </ui-color-plane-sb>
        <div class="my-3">
            <input type="range" min="0" max="360" step="1" value="90" oninput="document.querySelector('#custom-handle').h = this.value">
        </div>
        <button type="button" class="btn btn-primary" onclick="var c=document.querySelector('#custom-handle').toColor(); console.log([c.toHexString(),c.toRgbString(),c.toHslString(),c.toHsbString()].join('\n'))">toXxxString()</button>
        <button type="button" class="btn btn-primary" onclick="var c=document.querySelector('#custom-handle').toColor(); console.log(JSON.stringify([c.toHexString(),c.toRgb(),c.toHsl(),c.toHsb()],null,2))">toXxx</button>

    </div>

</body>
</html>
