    <script type="module">
        import UiColorSlPlaneElement from '../src/UiColorSlPlaneElement.js';
        UiColorSlPlaneElement.defineCustomElement();
    </script>
    <script>
        document.addEventListener('input-sl', (event) => { console.log(event.type,event.target.h,event.target.s,event.target.l) });
        document.addEventListener('change-sl', (event) => { console.log(event.type,event.target.h,event.target.s,event.target.l) });
    </script>
    
    <style>
        #custom-icon::part(sl-handle){
            border-width: 0px;
        }
        #custom-icon::part(sl-icon){
            border-width: 0px;
        }
        #custom-icon .custom-sl-icon{
            position: relative;
            overflow: visible;
            width: 20px;
            height: 20px;
            flex:0 0 auto;
        }
        #custom-icon .custom-sl-icon::before , #custom-icon .custom-sl-icon::after{
            position: absolute;
            content: '';
            height: 100%;
            width: 0px;
            border: 4px solid #fff;
            border-color: var(--border-color) transparent;;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
        #custom-icon .custom-sl-icon::after{
            height: 0px;
            width: 100%;
            border-color: transparent var(--border-color);
        }
    </style>
</head>

<body>
    <div class="container py-3" id="container0">
        <h1>Test - UiColorSlPlaneElement</h1>
        <hr>

        <ui-color-sl-plane id="target" class="mx-auto" style="max-width: 800px;height: 300px;" hue="90" saturation="0.7" lightness="0.3">
            
        </ui-color-sl-plane>
        <div class="my-3">
            <input type="range" min="0" max="360" step="1" value="90" oninput="document.querySelector('#target').h = this.value">
            <button type="button" class="btn btn-primary" onclick="alert(JSON.stringify(document.querySelector('#target').toHsl()))">toHsl()</button>
            <button type="button" class="btn btn-primary" onclick="alert(document.querySelector('#target').toString())">toHslString()</button>
            <button type="button" class="btn btn-primary" onclick="alert(JSON.stringify(document.querySelector('#target').toColor().toHsl()))">.toColor().toHsl()</button>
            <button type="button" class="btn btn-primary" onclick="alert(document.querySelector('#target').toColor().toHslString())">.toColor().toHslString()</button>
        </div>
        <hr>
        <ui-color-sl-plane id="custom-icon"  class="mx-auto border" style="max-width: 800px;height: 300px;" value="#aabbcc" >
            <div slot="sl-icon" class="custom-sl-icon"></div>
        </ui-color-sl-plane>

    </div>
    
</body>
