    <script type="module">
        import UiColorHueBarElement from '../src/UiColorHueBarElement.js';
        UiColorHueBarElement.defineCustomElement();
    </script>
    <script>
        document.addEventListener('input-hue', (event) => { console.log(event.type,event.target.h,event.target.hue) });
        document.addEventListener('change-hue', (event) => { console.log(event.type,event.target.h,event.target.hue) });
    </script>

    <style>

        #bg-width::part(bg){
            left:30%;
            right:30%;
            box-shadow: 0 0 0 2px #000;
            border-radius: 100px;
        }

      
        .custom-hue-handle{
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: content-box;
        }
        .custom-hue-handle::before {
            content: ' ';
            border: 8px solid #fff;
            border-width: 8px;
            display: block;
            box-sizing: border-box;
            border-color: transparent #000 transparent #fff;
            width: 100%;
            height: 0%;

        }
        ui-color-hue-bar[data-dir="horizontal"] .custom-hue-handle::before{
            border-color: #fff transparent #000 transparent;
            width: 0%;
            height: 100%;
        }

    </style>
    
</head>

<body>
    <div class="container py-3" id="container0">
        <h1>Test - UiColorHueBarElement</h1>
        <hr>
        <ui-color-hue-bar style="width: 300px;height: 400px;" hue="120"></ui-color-hue-bar>
        
        <hr>
        <ui-color-hue-bar style="width: 200px;height: 30px;" id="part-bg" hue="180"></ui-color-hue-bar>
        <hr>
        <ui-color-hue-bar  id="bg-width" style="width: 30px;height: 500px;" hue="180"></ui-color-hue-bar>
        <div class="form-text">내부 bg 너비를 줄임. 클릭 영역은 유지 됨. 내부 bg를 꾸밈</div>
        <hr>
        <ui-color-hue-bar style="width: 100%;height: 20px;--icon-width:4px 20px" data-dir="horizontal" hue="180"></ui-color-hue-bar>
        <hr>
        <ui-color-hue-bar style="width: 100%;height: 30px;" data-dir="horizontal" hue="180"></ui-color-hue-bar>
        <hr>
        <ui-color-hue-bar style="width: 50px;height: 200px;" hue="280">
            <div slot="hue-handle" class="custom-hue-handle"></div>
        </ui-color-hue-bar>
        <hr>
        <ui-color-hue-bar style="width: 200px;height: 50px;" hue="280" data-dir="horizontal">
            <div slot="hue-handle" class="custom-hue-handle"></div>
        </ui-color-hue-bar>
    </div>
    
</body>
